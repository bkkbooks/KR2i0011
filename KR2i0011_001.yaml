body:
  text: 江表志卷一宋鄭文寶撰江表志者有國之時朝章國典燦然可觀執政大臣以史筆為不急之務洎開寶之起居郎髙逺當職始編輯升元以來故事將成一家之言書未成逺疾亟數篋文章皆令焚之無孑遺矣太宗皇帝欲知前事命湯悅徐鉉撰成江南録十卷事多遺落無年可編筆削之際不無髙下當時好事者往往少之文寶耳目所及編成三卷方國志則不足比通厯則有餘聊足補亡以候來者庚戌嵗閏二月二十三日序南唐髙祖姓李諱知誥生於徐州有唐疏屬鄭王房之枝派父志祖榮不仕帝少孤有姨疑是姑字出家為尼出入徐溫宅與溫妻李氏同姓帝亦隨姨往來溫妻以其同宗憐其眀慧收為養子居諸子之上名曰知誥纍典郡符溫為丞相封齊王出鎮金陵留帝在都執楊氏政事帝沉幾逺略莫知其際折節謙下中外所瞻儉素無所耽溺內輔幼主外弼義父延楊祚十數年才及弱冠躬秉大權揚都繁浩之地海內所聞率由帝之力也丞相薨盡總其兵嘗以䜟詞有東海鯉魚飛上天之語由是懷逼禪位之心矣吳帝加以九錫封齊王丙申年執政者欲盡楊氏一朝然後受禪烈祖不可遂以國稱唐改元升元更姓李氏名忭追尊四廟號烈祖諡曰孝髙陵曰永陵元敬皇后宋氏祔焉年號升元皇子元宗一子少亡太弟遂齊王達衛王逖宰相宋齊丘李建勳嚴球張居永孫晟使相趙王李德誠張崇張宗周本李簡王輿劉威劉信王綰𬗋載用劉金徐玠馬仁裕樞密使杜鄴陳褒將帥崔初太王輿姚景祖重恩李鐇文臣楊彥伯髙弼孫晟李正眀龔凜肖儼成幼文賈潭嚴球為相是時王慎辟奉使北朝球在病請告烈祖授以論答凡數百事皆中機務然嚴球未見更就宅訪之球覽畢尤所稱美請更添事北朝問黑雲長劍多少來時及五十指揮皆在都下𬗋載用不曽赴鎮既到北朝一無所問首問黑雲長劍並柴載用所之慎辟依前致對梁太祖鋭意南征即時罷兵球宿金山常有詩云淮船分蟻㸃江市聚蠅聲烈祖性多嚴忌宋齊丘因而譖之以竹籠乘之沉於江口魏王知訓徐溫之子也烈祖曲宴引金觴賜酒曰願我弟百千長夀魏王意烈祖置毒引金器均之曰願與陛下各享五百嵗烈祖不飲久之申漸髙乘恢諧併而飲之內金鍾於懷袖亟趨而出到家腦潰而終宋齊丘鎮金陵有布衣李匡堯纍贄於宋宋知其忤物託以他故終不與之見一日宋公喪子匡堯隨吊客造謁宋復却之乃就賔次大書二十八字云安排唐祚挫强吳盡見先生設廟謨今日喪雛猶自哭讓皇宫眷合何如讓皇遷於太州永寧宫數年未卒每有嗣息及嵗即有中使賜衫笏加官即日而終讓皇居太州永寧宫常賦詩曰江南江北舊家鄉三十年來夢一場吳苑宫園今冷落廣陵臺榭亦荒凉煙凝逺岫愁千㸃雨滴孤舟淚數行兄弟四人三百口不堪回首細思量申漸髙嘗因曲宴天久無雨烈祖曰四郊之外皆言雨足惟都城百里之地亢旱何也漸髙曰雨怕抽稅不敢入城翌日市征之令咸有損除仲時光者樂部中之官伎也有寵於永陵生衛王逖烈祖矜嚴峻整有難犯之色常怒作數聲金鋪振動仲夫人左手擎飲右手捧匙安詳而進之雷電為之少霽後封越國大妃𬗋載用按家樂於後園有左右人竊於門隙觀之𬗋遇之乃召之後園使觀其按習曰隙風恐傷爾眸子江表志卷一
