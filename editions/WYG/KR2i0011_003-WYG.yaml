body:
  text: 江表志卷三宋鄭文寳撰後主諱煜字重光母曰鍾太后太子冀薨後主當立鍾謨以其徳輕志放請立弟從謙嗣主不可遂以太子縂百揆嗣主南幸洪州後主留居守金陵數月嗣主殂遺詔就金陵即位稱北朝正朔建隆壬戌嵗也後主天性純孝孜孜儒學虛懐接下賔對大臣傾奉中朝唯恐不及加以留心著述勤於政事至於書畵皆盡精妙然頗躭竺乾之教果於自信所以姦邪得計排斥忠讜土地日削貢奉不充越人肆諜逼於敵國又求援於契丹行人泄謀兵遂不解矣二十六即位十四年己亥國亡封隴西公贈吳王𦵏北邙鄭國夫人周氏祔起建隆二年終開寳八年皇子清源郡公仲禹岐王少亡宰相嚴續徐遊游簡言湯悦使相林仁肇王崇文何洙湯悦朱鄴陳海黄延謙嚴續柴克貞皇甫繼真鄭彦華樞宻使嚴續朱鞏陳將帥陳謙陳得誠孫彦祥李彦虬沙萬金劉存忠胡則宋克眀髙彦林益張粲張遇馬承信蔡振穆堅譚宗張進勍張仁照李雄吳翰龔慎儀羅延原馬承俊謝彦質謝文節文臣徐鉉徐鍇韓熙載王克貢張洎龔穎張佖湯淨朱銑喬舜潘佑湯獬湯滂郭昭度孫舉伍喬孟拱辰髙逺髙鉞馮謐李平張詔賈彬田霖顧彛趙宣輔後主嗣位之初夜夢有羊據文徳殿御榻而坐甚惡之自乙亥冬太祖吊伐之初首命吏部郎中楊克讓知府事固知隂數定也桞宜為監察御史居熙載門下韓以帷薄不修謫受太子右庶子分司南都議者疑桞宜上言宜無以自眀乃上章雪熙載後主叱曰爾不是魏徴頻好直言宜曰臣非魏徴陛下亦非太宗韓熙載上表其略云無積草之功可裨於國有滔天之過自累其身又老妻伏枕以呻唫稚子環床而哭泣三千里外送孤客以何之一葉舟中泛病身而前去遂免南行後卧疾終於城南戚家山後後主賜衾被以殮贈同平章事所司以為無贈宰相之故事後主曰當自我始徐鉉祭文所謂黔婁之衾賜從御府季子之印佩入泉扄後主奉竺乾之教多不茹葷嘗買禽魚謂之放生北苑水心西有清暉殿學士事太子太𫝊徐遼太子太保文安郡公徐遊别置一院於後謂之澄心堂臨汝姪元楀元機元榆元樞為員外郎及秘書秘宻院皆同散地用兵之際降御札移易兵士宻院不知皇甫繼勲伏誅之後夜出萬人斫寨招討分兵署事不知何徃皆出於澄心堂承直宣命者謂之澄心堂承㫖政出多門皆倣此也宋齊丘為儒日脩啟投姚洞天畧云城上之嗚嗚曉角吹入愁腸樹頭之䬃䬃秋風結成離緒又云其如干懇萬端無奈饑寒兩字時有識者云當須殍亡後果如其言胡則守江州堅壁不下曹翰攻之危急忽有旋風吹文字一紙墜於城中其詞曰由來秉節世無雙獨守孤城死不降何似知㡬早迴顧免教流血滿長江翰攻䧟江州殺戮殆盡謂之洗城焉開寳中將興兵革吉州城頭有一大面方三尺睨目多鬚狀如方相自旦至申酉時郡人觀覩甚衆所謂兆民顒顒之象霓裳羽衣曲自兵興之後絶無傳者周后按譜㝷之盡得其聲無不驚異眀年亡國之應也二朝父子為相者嚴可求嚴續子父為相者劉信劉彦真王綰王崇文周本周業陳誨陳徳誠皇甫暉皇甫繼勲弟興彦貞姪存忠亦為將兄弟承恩遇者馮延己馮延魯兄弟有大名者徐鉉徐鍇二人連呼文章則韓熙載徐鉉正直則蕭常權勢則鍾謨李徳眀建康受圍二嵗斗米十數千死者相藉人無叛心後主殂於大梁江左聞之皆巷哭為齋國中至寃者多立於御橋下謂之拜橋甚者操長釘携巨斧而釘脚又有闌入立於殿庭之下者為拜殿進士曽覬南省下第乃釘足謝泌下第立殿稱寃舉人之風掃地矣後主即位初張泌上書建隆二年七月廿八日將仕郎守江寧府句容縣尉張某言頓首頓首死罪死罪謹上書陛下臣聞行潦之水徒善利而不廣斗筲之器固大受而莫容雖欲强其所弗能亦不知其量也當陛下纘服丕圖嗣臨寳位百姓凝視仰徽猷而注目四方傾聽望徳音而練耳是陛下虚心側席克已納隍將敬承天恩以布新命非有樸直之士不能貢千慮一得之言於視聽也我國家積徳累仁重華承聖雖疆里褊小而基搆宏逺矧賢智左右前後比肩繼踵以道揚丕命致康休之化猶反掌耳又何以規然晉公之聽重人齊侯之用老馬豈重人踰百宗之善老馬過管仲之智蓋尺有所短寸有所長此之謂也臣是申旦不寐齋沐佇思以聞庶裨陛下維新之化萬分之一也伏唯我唐之有天下也造功自髙祖重熙於太宗聖子神孫歴載三百丕祚中否烈祖紹復大勲未集肆我大行嗣之徳則休眀降年不永焦勞癯瘠奄棄萬户民既歸仁天亦輔徳襲唐祚者非陛下而誰陛下居吳邸而庶事康庶事康而四方理升儲位而納百揆百揆納而黎民變當大行修廵狩之禮陛下應監國之任兢兢業業神人咸和令若秋霜澤如時雨洎宅憂翼室而無異望臣聞昔漢文帝承髙祖之後天下一家近三十年徳教被於物也乆矣而又封建子弟委用將相朱虛東牟之力陳平周勃之謀宋昌之忠諸侯之助由長子而立可謂安矣及即位戒慎謙讓服勤政事躬行節約思治平舉賢良進諫臣除收帑相坐之法去誹謗妖言之令不貴難得之貨不作無益之費其屈己愛人也如此而晁錯賈誼賈山馮唐之徒上書進諫言必激切至於痛哭流涕之辭者蓋懼靡不有初鮮克有終也而文帝優容不咈聖徳充塞㡬致刑措王業嵬嵬千載之下風聲不冺皆克勤勉强而臻於此也今陛下當數載大兵之後鄰封襲利之日國用匱竭民力疲勞而内無劉章興居之臣朝無絳侯曲逆之佐可謂危矣非陛下聰眀睿知視險若夷豈能如是乎設漢文帝之才處今日之勢何止於寒心銷志而已陛下以天未厭徳民方戴舊則可矣若欲駭逺近之聽慰億兆之思臣敢昧死言之夫人君即位之始必在𤼵號施令非秉漢文帝之心以政究人臣不知其可也臣以國家今日之急務畧陳其綱要伏唯留聽幸甚一曰舉簡大以行君道二曰略繁小以責臣職三曰眀賞罰以彰勸善懲惡四曰慎名器以杜作威擅權五曰詢言行以擇忠良六曰均賦役以安黎庶七曰納諫諍以容正直八曰究毁譽以逺讒佞九曰節用以行克儉十曰克己以固舊好亦在審先代之治亂考前載之褒貶纎芥之惡必去毫厘之善必為宻取舍之機濟寛猛之政進經學之士退掊尅之吏察邇言以廣視聽好下士以通蔽塞斥無用之物罷不急之務此而不治臣不信矣臣又聞之詩曰敬之敬之天維顯思書曰儆戒無虞罔失法度易曰其亡其亡繋於苞枽言君人者必懼天之眀威遵古之令典作事謀始居安慮危也臣觀今日下民期陛下之致治雖百穀之仰膏雨不足喻焉願陛下勉强行之無俾文帝専美於漢臣幸承勲緒忝逢昭代書賢能於鄉老第甲乙於宗伯由文章而進詩待詔於金門比八年於兹矣沐大行育材之化聖鑒不逺當陛下御極之辰王猷未洽若復優㳺義府嘿然無辭則媿然而有靦面目矣塵黷宸聽伏切兢憂臣某誠惶誠恐死罪謹言御批云古人讀書不祗謂詞賦口舌也委贄事人忠信無隐斯可謂不辱士之風矣况朕纂承之始政徳未敷哀毁之中知慮荒亂深虞布政設教有不足仰副民望泌居下位而首進讜論觀詞氣激揚次搜覽十事煥美可舉而行朕必善初而思終卿無今直而後佞其中事件亦有已於赦書處分者二十八日江表志卷三
