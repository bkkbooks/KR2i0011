body:
  text: 江表志載記𩔖提要臣等謹案江表志三卷宋鄭文寳撰文寳字仲賢寧化人南唐鎮海節度使彦華之子初仕為校書郎入宋舉太平興國八年進士厯官至陜西轉運使兵部員外郎東都事略載入文藝𫝊中始徐鉉湯悦奉詔集李氏事作江南録多所遺落文寳因為此編上卷紀烈祖事中卷紀元宗事下卷紀後主事不編年月於諸王大臣並標其名亦無事實記載甚簡又獨全録韓熙載歸國狀張䛑諫疏各一首去取亦頗不可解然文寳為南唐舊臣硯北雜志載其歸宋後常披蓑荷笠作漁者以見李煜深加寛譬煜甚忠之鐵圍山叢談又載其初受業於徐鉉及為陜西轉運使時鉉方謫居仍叩謁執弟子禮鉉亦坐受其拜盖惓惓篤故舊之誼者故其紀後主亡國亦祇以果於自信越人肆謀為言與徐鉉墓碑相𩔖其意尚有足取其記李煜時貢獻賦歛一條王鞏隨手雜録全取之且注其下曰江表志鄭文寳撰則亦頗重其書又如江南江北舊家鄉一詩文寳以為呉讓皇楊溥所作而馬令南唐書則直以為後主作然文寳親事後主所聞當得其真是以可以訂馬書之誤也晁氏讀書志稱文寳有序題庚戌乃大中祥符三年此本無之今從學海𩔖編補録成完帙焉乾隆四十三年九月恭校上總纂官臣紀昀臣陸録熊臣孫士毅總校官臣陸費墀
  hash: sha256:78fb270e3cca2f6f11a63d188d1324628596e6b37f18148be7557aa5c60c4bbe
