body:
  text: 江表志卷二宋鄭文寳撰元宗名璟烈祖元子也母曰宋太后帝謙和眀睿奢儉得中搜訪賢良訓齊師旅政無大小咸必躬親善曉音律不至躭溺深知理體洞明物情聖徳聞於鄰國矣在吳朝為太子諭徳後累居丞相嘗於廬山搆書堂有物外之意烈祖即位為皇太子烈祖崩於柩前即位年四十九在位十九年廟號元宗諡曰眀徳孝道陵曰順陵皇后光穆順聖鍾氏年號二保大交泰皇子太子冀陳王少亡保寧王少亡慶王宏茂少亡從王從嘉鄭王從善降封南楚國公鄧王從謐降封江國公吉王從謙降封鄂國公昭平公從度文陽郡公從信宰相宋齊丘李建勲馮延己徐㳺孫晟嚴續使相王崇文李得成郭宗謝匡朱鄴柴克宏孫漢威皇甫暉劉彦真劉仁贍樞宻使嚴續湯悦李徴古陳覺唐鎬陳處堯魏岑偽王楚玉馬希蕚光山王王延政將帥馬先進陳誨魏昭何洙按南唐書作何敬洙林仁肇張漢卿鄭彦華丘仁詡陸孟俊王建封祖傳恩馬在鄭再誠張彦卿劉崇俊張全約時厚武暉彭師暠查文徽許文慎邊鎬陳承昭髙弼文臣江文蔚王仲連李貽業游簡言湯悦常夢錫朱鞏陳元藻馮延魯潘承祐髙逺田霖張義方髙越覃潭張緯鍾謨李徳眀張易趙宣陳繼善元宗為太子日嘗問安寢門㑹烈祖安寢未解夢便殿有龍據欄檻蜿蜒可懼烈祖既寤命左右觀之即太子也蘓洪進揚州版築發一塜不顯姓名刋石為銘曰日為箭兮天為弓射四時兮弓無窮但見天將眀月在不覺人随流水空南山石兮髙穹窿夫人墓兮在其中猿啼烏呌煙濛濛千年萬嵗松栢風左散騎常侍王仲連北土人事元宗常謂曰自古及今江北文人不及江南才子多仲連對曰誠如聖㫖陛下聖祖𤣥元皇帝降於亳州真元縣文宣王出於兖州曲阜縣亦不為少矣嗣主有媿色兩浙錢氏偏覇一方急徴苛慘科賦凡欠一斗者多至徒罪徐瑒常使越云三更已聞獐麂號呌達曙問於驛吏乃縣司徴科急鄉民多赤體有弊葛褐者多用竹篾繫腰百執事非刻理不可雖貧者亦家累千金元宗割江南之後金陵對岸即為敵境因遷都豫章舟車之盛旌旂絡繹凡數千里百司儀衛洎禁校帑蔵不絶者近一載上每北顧忽忽不樂澄心堂承㫖奏裕嵗徴多引屏風障之嘗吟御製詩云靈槎思浩𣺌老鶴憶崆峒上友愛之分備極天倫登位之初太弟遂燕王逷齊王達出處游宴未嘗相捨軍國之政同為參决保大五年元日大雪上詔太弟以下登樓展燕咸命賦詩令中使就私第賜李建勲建勲方㑹中書舍人徐鉉勤政殿學士張義方於浮亭即時和進元宗乃召建勲鉉義方同入夜艾方散侍臣皆有圖有咏徐鉉為前後序太弟以下侍臣法部絲竹周文炬主之樓閣宫殿朱澄主之雪竹寒林董元主之池沼禽魚徐崇嗣主之圖成無非絶筆侍宴詩纔記數篇而已御詩云珠簾髙捲莫輕遮徃徃相逄隔嵗華春氣昨朝飄律管東風今日散梅花素姿好把芳姿比落勢還同舞勢斜坐有賔朋尊有酒可憐情味屬儂家建勲詩云紛紛忽降當元㑹着物輕眀似月華狂灑玉池初放仗宻沾宫樹未妨花迥封雙闕千㝷峭冷壓南山萬仞斜寧意晩來中使出御題宣賜老僧家鉉詩云一宿東林正氣加便随仙仗放春華散飄白獸難分影輕綴青旂始見花落砌更依宫舞轉入樓偏向御衣斜嚴徐幸待金門詔願布堯年賀萬家義方詩云憐當嵗日紛紛落天讚瑶華助物華自古醉仙標瑞牒有誰輕擬比楊花宻飄粉蕋先同冷静壓庭枝勢欲斜豈但小臣添興味狂歌醉舞一千家陳覺李徴古少日依託鎮南楚公齊丘援引至樞宻使保大之末王室多故覺及徴古屢上變言本命已改請元宗深居後苑請國老攝國事令陳扃草勑扃袖勑上前曰陛下既署此勑臣不復見陛下矣元宗使鍾謨言於周世宗曰罪大臣理合奏啓世宗曰自家國事大國難預命湯悦草制曰惡莫大於無君罪莫深於賣國宋齊丘本一布衣遭遇先帝不二十年窮極富貴陳覺李徴古言齊丘是造國之手理當居攝云云即日齊丘青陽安置覺徴古各賜自盡宋齊丘將至青陽絶食數日後命至家人亦菜色中使云令公捐舘方始供食家人以絮塞口而卒有黒氣一道舟中起直貫九華朱遵度本青州書生好蔵書髙尚不仕閒居金陵著鴻漸學記一千卷羣書麗藻一千卷漆經數卷皆行於世太平縣攝氏女年方十三随母採薪母為暴虎搏去蹲之將食女持刃自後跳上虎脊交抱連割去其頸虎奮擲不脱遂自困死女捨之募人共收母屍元宗嗣位李建勲出師臨川將行謂所親曰今主上寛仁廣大之度比於先帝逺矣但質性未定左右獻替須得正方之士若於目前所覩終恐不守舊業及馮延魯陳覺出討閩中徴督軍糧急於星火建勲以詩寄延魯曰粟多未必為全計師老須防有援兵既而福州之軍果為越人所敗歸取司空累表致謝自稱鍾山公詔授司徒不起時覺學士湯悦致狀賀之建勲以詩答曰司空猶不作那敢作司徒幸有山公號如何不見呼先時宋齊丘自京口求退歸青陽號九華先生未週歲一徵而起時論薄之建勲年徳未衰時望方重或有以宋公比之因為詩曰桃花流水須相信不學劉郎去又来捐舘之夕告門人曰時事如此吾得保全為幸已甚吾死不須封樹立碑墳土任民畊作無延他日毁斵之弊其後甲戌之變公卿塋域為兵發殆遍獨建勲莫知葬所卒不及禍魏王知訓為宣州帥苛歛暴下百姓苦之因入覲侍宴伶人戱作緑衣大面正立若鬼神狀傍一人問曰何者緑衣對曰吾宣州土地神王入覲和地皮掠來因至於此張崇帥廬江好為不法士庶苦之嘗入覲江都廬人幸其改任皆相謂曰渠伊不復來矣崇歸聞之計口徴渠伊錢眀年再入覲盛有罷府之耗人不敢指實皆道路相目捋鬚相慶歸又徴捋鬚錢嘗為伶人所戯使一伶假為人死有譴當作水族者隂府判曰焦湖百里一任作獺崇亦不慚馮謐朝堂待漏因話及眀皇賜賀監三百里鏡湖今不敢過望但恩賜元武湖所三十里亦當足矣徐公曰國家不惜元湖所乏者賀知章耳徐公撰江南録議者謂之不直蓋不罪宋國老故也國老當淮甸失律之後援引門人陳覺李徴古掌樞宻之任且授其意曰天命已去元宗當深居後苑國老監國元宗詔之將行頼羣臣力爭之而止舉國皆聞為臣之道餘可知矣文憲太子兾既正儲闈即専國事而又卒多不法元宗一旦甚怒撻之以杖且曰當命太弟遂兾有懼色它日宻使持酖付昭慶宫使袁從範從範從太弟金陵未㡬範子承幹為遂嬖臣宋何九讒搆遂許寘之法範懼而且怨㑹遂繫鞫暑渇晚進漿遇酖即日未殯而體已潰矣元宗誅戮大臣之後暮年於禁中徃徃見宋齊丘陳覺李徴古如生叱之不去甚惡之因議南幸太子冀既病數見太弟遂為祟於昭慶宫中前進士韓熈載江北行止云熈載本貫齊州隠居嵩岳雖叨科第且晦姓名今則慕義來朝假身為賈既及疆境舍賈行蔵某聞釣巨鰲者不投取魚之餌斷長鯨者非用割雞之刀是故有經邦治亂之才可以踐輔弼之位得之則佐時成績救萬姓之焦熬失之則遁世蔵名卧一山之蒼翠某爰思㓜稚便異凡童竹馬蒿弓固罔親於好弄杏壇槐里能不倦於修身但勵志以為文每棲身以學武得麟經於泗水寧怯議圍授豹略於坯垠方酣永戰占唯竒骨夢以生松敢期墮闕一字之文尚愧擔簦之路於是攫龍頷編虎鬚繕獻㨗之師徒修受降之城壘爭䧺筆陣决勝詞鋒運陳平之六竒飛魯連之一箭塲中勍敵不攻而自立降旗天下鴻儒遥望而盡摧堅壘横行四海髙步出羣姓名遽列於煙霄行止遂離於塵俗且口有舌而手有筆腰有劍而袖有鎚時方亂離迹猶飄泛徒以術精韜畧氣激雲霓瞋目張而隂電揺怒呼發而晴雷動神驅鬼殿天蓋地車鬭霹靂於雲中未為蹻㨗喝摴蒱於筵上不足稱豪藴機權而自立英雄仗勁節而豈甘貧賤但攘袂叱咤㧞劍長嗟不偶良時孰能言志既逢昭代合展壯圗伏聞大吳肇基聿修文教聨顯懿於中土走眀恩於外夷萬邦咸貞四海如砥燮和天地巖廊有禹稷臯夔灑掃煙塵藩翰有韓彭衛霍豈獨漢稱三傑周舉十人凝王氣於神都吐祥光於丹闕急賢共理侔漢氏之縣科待旦旁求𩔖周人之設醴而又鄰邦接畛敵境連封一條雞犬之相聞兩岸馬牛之相望彼則恃之以力數年而頻見傾亡此則禮之以賢一坐而無聞震動由是見盛衰之勢審吉凶之機得不上順天心次量人事宜向眀背暗舍短從長聖賢所圖古今一致然而出青山而裹足度長淮而棄繻𣲖遥終赴於天池星逺須環於帝座是携長策來詣大朝伏唯司空楚劍倚天秦松發地言雄武則平窺絳灌語兵機則髙掩孫吳經受素王書𫝊𤣥女莫不鞭撻宇宙驅役風雷勞愁積而髀肉生憤氣激而背癰起一怒而豺狼竄懾再呼而神鬼愁驚搥蠻鼓而簸朱旗雷奔電走掉闕一字鎚而揮白刄星落雲飛猛將立龍强兵合虎可以力平鯨海可以拳擊鰲山破堅每自於先登敵無不克策馬嘗時於後殿功迺非矜國家付以肺腸用為保障勲蔵盟府名鏤景鐘今則化舉六條地方千里示之以寛猛化之以温恭繕甲兵而耀武威緩户口而䘏農事漫洒随車之雨洗活嘉田輕揺逐扇之風吹消沴氣可謂仁而有斷謙而愈光賢豪向義以歸心姦宄望風而屏迹佇見秉旄仗鉞列土分茅修職貢以勤王控臨四海率諸侯而定覇彈壓八方遐邇具瞻威名逺著况復設庭燎以待士開雪宫以禮賢前席請論其韜鈐危坐願聞於興廢古今英傑孰可比方某才越通津已觀至化及陳上謁罔棄謏才是敢輙述行蔵鋪盡毫幅况聞鳥有鳳魚有龍草有芝泉有醴斯皆嘉瑞出應昌期某幸處士倫謬乏人理足以副明君之奬善恢聖代之樂賢昔婁敬布衣上言於漢祖曹翽草澤陳謀於魯公失范増而項氏不興得吕望而周朝遂覇使逺人之來格實至徳之光昭謹具行止如前伏請准式順義六年七月歸眀進士韓熈載狀江表志卷二
